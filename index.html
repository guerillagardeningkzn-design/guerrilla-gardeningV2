<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2E7D32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Guerrilla Gardening</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Icons (create these PNG files or use placeholders) -->
  <link rel="icon" href="assets/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- Fonts (optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Fullscreen trigger button (will be styled big & noticeable) -->
  <button id="fullscreen-btn">Go Full Screen (recommended for best experience)</button>

  <!-- Portrait warning overlay -->
  <div id="portrait-warning">
    Please rotate your device to landscape mode for the best experience
  </div>

  <!-- Fixed UI overlay -->
  <div id="ui-overlay">
    <div class="hud-top-left">
      Coins: <span id="coins-display">0</span> 🪙
    </div>
    <!-- Add other HUD elements as needed -->
  </div>

  <!-- Map viewport -->
  <div id="map-viewport">
    <div id="map-container">
      <div id="game-container">
        <!-- Dynamic content goes here -->
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
