<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Mobile / PWA hints -->
  <meta name="theme-color" content="#2E7D32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Guerrilla Gardening</title>

  <!-- PWA manifest (leave included for now – create manifest.json later) -->
  <link rel="manifest" href="/manifest.json">

  <!-- Icons (placeholders – replace with real files later) -->
  <link rel="icon" href="assets/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- Fonts (optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Fullscreen trigger button – visible until fullscreen is activated -->
  <button id="fullscreen-btn">Go Full Screen (recommended)</button>

  <!-- Portrait orientation warning overlay -->
  <div id="portrait-warning">
    Please rotate your device to landscape mode for the best experience
  </div>

  <!-- Fixed UI overlay – always visible -->
  <div id="ui-overlay">
    <div class="hud-top-left">
      Coins: <span id="coins-display">0</span> 🪙
    </div>

    <!-- Add other HUD elements here later (gems, stars, hearts, etc.) -->
  </div>

  <!-- Main game viewport -->
  <div id="map-viewport">
    <div id="map-container">
      <div id="game-container">
        <!-- All dynamic content is injected here -->
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
