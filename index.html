<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Guerrilla Gardening</title>
  
  <!-- Basic PWA / mobile hints (expand later) -->
  <meta name="theme-color" content="#2E7D32">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Static UI overlay – always on top, fixed -->
  <div id="ui-overlay">
    <div class="hud-top">
      <span>Coins: <span id="coins-display">0</span></span>
      <!-- Add health bar, inventory, pet status, etc. here later -->
    </div>

    <button id="back-to-overview">Back to Overview</button>
  </div>

  <!-- Zoomable map layer – this replaces your old #game-container -->
  <div id="map-viewport">
    <div id="map-container">
      <div id="game-container">
        <!-- Your existing dynamic content will go here -->
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
