<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Guerrilla Gardening</title>
  
  <!-- Basic PWA / mobile hints (expand later) -->
  <meta name="theme-color" content="#2E7D32">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Fixed UI layer – always on top -->
  <div id="ui-overlay">
    <!-- Coins, health bar, back button, inventory, pet status, etc. go here -->
    <div class="hud-top">
      <span id="coins-display">Coins: 0</span>
      <!-- Add more HUD elements here later -->
    </div>
    <button id="back-to-overview">Back to Overview</button>
    <!-- Future: pet status, inventory icons, zoom buttons, etc. -->
  </div>

  <!-- Zoomable map layer -->
  <div id="map-viewport">
    <div id="map-container">
      <div id="game-container">
        <!-- dynamic background + invasives stay here -->
      </div>
    </div>
  </div>
</body>
</html>
