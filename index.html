<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Mobile / PWA hints -->
  <meta name="theme-color" content="#2E7D32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Guerrilla Gardening</title>

  <!-- PWA manifest (leave included for now – create manifest.json later) -->
  <link rel="manifest" href="/guerrilla-gardeningv2/manifest.json">

  <!-- Icons (placeholders – replace with real files later) -->
  <link rel="icon" href="assets/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- Fonts (optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Fullscreen trigger button – visible until fullscreen is activated -->
  <button id="fullscreen-btn">Go Full Screen (recommended)</button>

  <!-- Portrait orientation warning overlay -->
  <div id="portrait-warning">
    Please rotate your device to landscape mode for the best experience
  </div>

  <!-- Fixed UI overlay – always visible -->
  <div id="ui-overlay">
  <!-- Coins badge – top-left -->
  <div class="hud-badge hud-coins">
    <span id="coins-display">0</span> 🪙
  </div>

  <!-- Resources cluster – top-right -->
  <div class="hud-resources">
    <div class="hud-badge hud-diamonds">
      💎 <span id="diamonds-display">0</span>
    </div>
    <div class="hud-badge hud-stars">
      ⭐ <span id="stars-display">0</span>
    </div>
    <div class="hud-badge hud-energy">
      ⚡ <span id="energy-display">100</span>
    </div>
  </div>
</div>

  <!-- Main game viewport -->
  <div id="map-viewport">
    <div id="map-container">
      <div id="game-container">
        <!-- All dynamic content is injected here -->
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js">
  if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/guerrilla-gardeningv2/sw.js')
      .then(reg => console.log('Service Worker registered'))
      .catch(err => console.log('Service Worker error:', err));
  });
}</script>
</body>
</html>
