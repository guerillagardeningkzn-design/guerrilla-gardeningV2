<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Guerrilla Gardening Editor - Full</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; background:#111; color:white; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { background:#222; padding:10px 15px; display:flex; gap:15px; align-items:center; flex-wrap:wrap; border-bottom:1px solid #444; z-index:100; }
  button, input, select, textarea { padding:8px 12px; border-radius:6px; border:1px solid #444; background:#333; color:white; cursor:pointer; }
  button:hover { background:#444; }
  .tab-btn { padding:8px 16px; background:#333; border:none; border-radius:6px 6px 0 0; cursor:pointer; font-weight:bold; }
  .tab-btn.active { background:#444; border-bottom:3px solid #4CAF50; }
  #main { flex:1; display:flex; overflow:hidden; }
  #sidebar { width:360px; background:#222; padding:15px; overflow-y:auto; border-right:1px solid #444; }
  #template-list, #entity-list, #map-list { margin:15px 0; }
  .entity-item, .template-item, .map-item { padding:8px; margin:4px 0; background:#333; border-radius:6px; cursor:pointer; }
  .entity-item:hover, .template-item:hover, .map-item:hover { background:#444; }
  .entity-item.selected, .template-item.selected, .map-item.selected { background:#555; border-left:4px solid #4CAF50; }
  label { display:block; margin:10px 0 4px; font-size:0.9rem; }
  input[type="text"], input[type="number"], select, textarea { width:100%; padding:6px; background:#333; border:1px solid #555; color:white; border-radius:4px; }
  textarea { min-height:80px; resize:vertical; }
  #project-section { margin-bottom:20px; padding:12px; background:#282828; border-radius:8px; }
  #project-status { font-size:0.9rem; margin-top:8px; }
  #recent-files { margin-top:10px; }
  .recent-item { padding:6px; background:#333; margin:4px 0; border-radius:4px; cursor:pointer; font-size:0.85rem; }
  .recent-item:hover { background:#444; }
  #canvas-wrapper { flex:1; position:relative; overflow:hidden; background:#000; touch-action:none; }
  #canvas { position:absolute; inset:0; width:100%; height:100%; background-size:contain; background-position:center; background-repeat:no-repeat; transform-origin:0 0; transition:transform 0.1s ease-out; }
  .entity { position:absolute; cursor:move; min-width:40px; min-height:40px; background:rgba(0,255,100,0.6); border-radius:50%; border:3px solid #0f0; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:black; box-shadow:0 0 8px rgba(0,0,0,0.6); user-select:none; z-index:10; overflow:hidden; }
  .entity img { width:100%; height:100%; object-fit:contain; }
  .entity.selected { border-color:yellow; box-shadow:0 0 12px yellow; }
  .entity.locked { background:rgba(150,150,150,0.6); border-color:gray; }
  .tab-content { flex:1; display:none; }
  .tab-content.active { display:flex; }
  .save-btn { background:#4CAF50 !important; margin-top:12px; width:100%; }
  .error { color:#ff7777; font-size:0.85rem; margin-top:4px; }
</style>
</head>
<body>

<header>
  <h2>Guerrilla Gardening Editor</h2>
  <button id="settings-tab" class="tab-btn active">Settings</button>
  <button id="entities-tab" class="tab-btn">Entities Setup</button>
  <button id="map-tab" class="tab-btn">Map Creator</button>
</header>

<div id="main">
  <div id="settings-content" class="tab-content active">
    <div id="sidebar">
      <div id="project-section">
        <label>Repo Root Path (for local preview)</label>
        <input type="text" id="repo-root" placeholder="C:/Users/You/Projects/guerrilla-gardeningV2/" />
        <button id="save-root">Save Root Path</button>
        <div id="project-status" style="margin-top:8px;">No root set – local preview limited.</div>
        <p style="font-size:0.8rem; color:#aaa; margin-top:8px;">
          Set your local repo folder for accurate path stripping & previews.<br>
          JSON will use clean relative paths (assets/…)
        </p>
      </div>

      <h3>Recent Images (relative paths)</h3>
      <div id="recent-files"></div>

      <button id="save-project" class="save-btn">Save Project (All JSON)</button>
      <button id="export-zip-fallback">Export as ZIP (backup)</button>
    </div>
  </div>

  <div id="entities-content" class="tab-content">
    <div id="sidebar">
      <button id="add-template">Add New Entity Template</button>
      <h3>Entity Templates</h3>
      <div id="template-list"></div>
    </div>
    <div id="properties" style="flex:1; padding:20px; overflow-y:auto; display:none;">
      <h2>Edit Template</h2>
      <div id="template-error" class="error"></div>

      <label>Type</label>
      <select id="temp-type">
        <option value="marker">Marker (island)</option>
        <option value="invasive">Invasive</option>
        <option value="pickup">Pickup</option>
        <option value="transition">Zone Transition</option>
        <option value="critter">Critter / NPC</option>
        <option value="plant-spot">Plant Spot</option>
        <option value="seed">Seed</option>
      </select>

      <label>Name *</label>
      <input type="text" id="temp-name" required />

      <label>Default Icon (relative) *</label>
      <input type="text" id="temp-icon" placeholder="assets/entities/invasives/seaweed/seaweed-02.png" required />
      <button id="temp-icon-upload-btn">Upload & Normalize Icon</button>
      <input type="file" id="temp-icon-upload" accept="image/*" style="display:none;" />
      <div id="icon-preview" style="margin-top:10px; max-height:160px; overflow:hidden;"></div>

      <div class="field-group">
        <label>Coins Dropped</label>
        <input type="number" id="temp-coins" min="0" value="0" step="1" />
        <label>Damage on Encounter</label>
        <input type="number" id="temp-damage" min="0" value="0" step="1" />
        <label>Health Contribution</label>
        <input type="number" id="temp-health" min="0" value="0" step="1" />
        <label>Locked by default?</label>
        <input type="checkbox" id="temp-locked" />
      </div>

      <div class="field-group" id="respawn-group">
        <label>Respawn Time</label>
        <input type="number" id="temp-respawn-value" min="0" value="0" step="1" style="width:60%;" />
        <select id="temp-respawn-unit" style="width:35%;">
          <option value="hours">hours</option>
          <option value="days">days</option>
        </select>
      </div>

      <div class="field-group" id="drop-chance-group">
        <label>Drop Chance (%)</label>
        <input type="number" id="temp-drop-chance" min="0" max="100" value="0" step="5" />
      </div>

      <div class="field-group" id="spawn-actions-group">
        <label>Spawn Actions (one per line)</label>
        <textarea id="temp-spawn-actions" placeholder="spawn:seed:palm@random:20m radius:2"></textarea>
      </div>

      <div class="field-group" id="growth-group">
        <label>Growth Timer (total hours to mature)</label>
        <input type="number" id="temp-growth-hours" min="0" value="0" step="1" />
        <label>Growth Stages</label>
        <select id="temp-growth-stages">
          <option value="2">Fresh → Mature</option>
          <option value="3">Fresh → Sprout → Mature</option>
          <option value="4">Fresh → Seedling → Sprout → Mature</option>
        </select>
      </div>

      <div class="field-group" id="conditions-group">
        <label>Visibility / Activation Conditions</label>
        <textarea id="temp-conditions" placeholder="zoneHealth > 50 OR playerHasItem:seeds"></textarea>
      </div>

      <label>Tooltip / Description</label>
      <textarea id="temp-tooltip"></textarea>

      <label>Dialog Tree (JSON array)</label>
      <textarea id="temp-dialog">[]</textarea>

      <label>Inventory Items (JSON array)</label>
      <textarea id="temp-inventory">[]</textarea>

      <div style="margin-top:20px;">
        <button id="save-template">Save Template</button>
        <button id="delete-template" style="background:#c62828;">Delete Template</button>
      </div>
    </div>
  </div>

  <div id="map-content" class="tab-content">
    <div id="canvas-wrapper">
      <div id="canvas"></div>
    </div>
    <div id="sidebar">
      <h3>Current Map</h3>
      <label>Map Name *</label>
      <input type="text" id="current-map-name" value="current-map" />
      <button id="load-map">Load Map</button>
      <button id="new-map">New Map</button>

      <label>Background Image (relative)</label>
      <input type="text" id="bg-path" placeholder="assets/backgrounds/island-full.jpg" />
      <button id="bg-upload-btn">Upload & Normalize BG</button>
      <input type="file" id="bg-upload" accept="image/*" style="display:none;" />

      <h3>Entities on Map</h3>
      <div id="entity-list"></div>

      <label>Add from Template</label>
      <select id="add-from-template"></select>
      <button id="add-entity-map">Add</button>

      <h3>Selected Entity</h3>
      <div id="map-properties" style="display:none;">
        <label>Name (override)</label>
        <input type="text" id="map-name" />
        <label>Left (%)</label>
        <input type="number" id="map-left" step="0.1" min="0" max="100" />
        <label>Top (%)</label>
        <input type="number" id="map-top" step="0.1" min="0" max="100" />
        <label>Scale (%)</label>
        <input type="range" id="map-scale-slider" min="50" max="300" step="5" value="100" />
        <input type="number" id="map-scale" step="5" min="50" max="300" value="100" />
        <button id="delete-map-entity">Delete from Map</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────────
let templates = [];
let currentMapEntities = [];
let selectedTemplateId = null;
let selectedMapEntityId = null;
let backgroundUrl = null; // full preview URL
let backgroundRelative = null; // clean relative for JSON
let currentTab = 'settings';
let projectDirectoryHandle = null;
let repoRoot = localStorage.getItem('repoRoot') || '';
let recentFiles = JSON.parse(localStorage.getItem('recentFiles') || '[]');
let currentZoom = 1;
let canvasPanX = 0, canvasPanY = 0;
let isPanning = false;
let autoSaveTimeout = null;

const SNAP_GRID = 5;

// ─── Path Normalization ────────────────────────────────────────────────────────
function normalizeToRelative(rawPath) {
  if (!rawPath) return '';
  let path = rawPath.trim().replace(/^["']+/, '').replace(/["']+$/, '');
  path = path.replace(/^file:\/{2,3}/i, '').replace(/\\/g, '/');

  const normRoot = repoRoot.replace(/\\/g, '/').replace(/\/+$/, '');
  if (normRoot && path.includes(normRoot)) {
    path = path.split(normRoot)[1] || path;
    path = path.replace(/^[/\\]+/, '');
  }

  if (!path.startsWith('assets/') && path.includes('assets')) {
    path = 'assets/' + path.split('assets')[1].replace(/^[/\\]+/, '');
  }

  return path;
}

function updateRootStatus() {
  const status = document.getElementById("project-status");
  status.textContent = repoRoot ? `Root: ${repoRoot}` : "No root set – local preview limited.";
  status.style.color = repoRoot ? "#8f8" : "#f88";
}

document.getElementById("save-root").addEventListener("click", () => {
  let val = document.getElementById("repo-root").value.trim();
  val = val.replace(/\\/g, '/').replace(/\/+$/, '');
  localStorage.setItem('repoRoot', val);
  repoRoot = val;
  updateRootStatus();
});

// ─── Recent Files ──────────────────────────────────────────────────────────────
function addToRecent(path) {
  path = normalizeToRelative(path);
  if (!path) return;
  recentFiles = recentFiles.filter(p => p !== path);
  recentFiles.unshift(path);
  recentFiles = recentFiles.slice(0,10);
  localStorage.setItem('recentFiles', JSON.stringify(recentFiles));
  renderRecentFiles();
}

function renderRecentFiles() {
  const cont = document.getElementById("recent-files");
  cont.innerHTML = "";
  recentFiles.forEach(p => {
    const div = document.createElement("div");
    div.className = "recent-item";
    div.textContent = p;
    div.onclick = () => {
      document.getElementById("temp-icon").value = p;
      loadImagePreview(p);
      triggerAutoSave();
    };
    cont.appendChild(div);
  });
}

// ─── Image Preview ─────────────────────────────────────────────────────────────
function loadImagePreview(relPath) {
  const prev = document.getElementById("icon-preview");
  prev.innerHTML = "";
  if (!relPath) return;
  let url = relPath;
  if (repoRoot && !relPath.startsWith('http') && !relPath.startsWith('data:')) {
    url = `file:///${repoRoot}/${relPath}`;
  }
  const img = document.createElement("img");
  img.src = url;
  img.style.maxWidth = "100%";
  img.style.maxHeight = "160px";
  img.style.objectFit = "contain";
  img.onerror = () => prev.innerHTML = "<p style='color:#f88'>Preview failed</p>";
  prev.appendChild(img);
}

// ─── Tab Switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const content = document.getElementById(tab + "-content");
  const btn = document.getElementById(tab + "-tab");
  if (content && btn) {
    content.classList.add('active');
    btn.classList.add('active');
  } else {
    console.error(`Tab elements not found for: ${tab}`);
  }
}

// ─── Event Listeners ───────────────────────────────────────────────────────────
document.getElementById("settings-tab").addEventListener("click", () => switchTab("settings"));
document.getElementById("entities-tab").addEventListener("click", () => switchTab("entities"));
document.getElementById("map-tab").addEventListener("click", () => switchTab("map"));

// ─── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  updateRootStatus();
  renderRecentFiles();
  switchTab("settings");
  // Other init...
});

// ─── Add Template ──────────────────────────────────────────────────────────────
document.getElementById("add-template").addEventListener("click", () => {
  const type = prompt("Enter template type:", "invasive") || "invasive";
  const id = `${type}-${Date.now()}`;
  const template = {
    id,
    type,
    name: `New ${type.charAt(0).toUpperCase() + type.slice(1)}`,
    icon: "",
    coins: 0,
    damage: 0,
    health: 0,
    locked: false,
    tooltip: "",
    dialog: [],
    inventory: [],
    respawnValue: 0,
    respawnUnit: "hours",
    dropChance: 0,
    spawnActions: [],
    growthHours: 0,
    growthStages: 2,
    conditions: ""
  };
  templates.push(template);
  renderTemplateList();
  selectTemplate(id);
  triggerAutoSave();
});

// ─── Save Template ─────────────────────────────────────────────────────────────
document.getElementById("save-template").addEventListener("click", () => {
  if (!selectedTemplateId) return;
  const template = templates.find(t => t.id === selectedTemplateId);
  if (!template) return;
  const name = document.getElementById("temp-name").value.trim();
  const icon = normalizeToRelative(document.getElementById("temp-icon").value.trim());
  if (!name || !icon) {
    document.getElementById("template-error").textContent = "Name and Icon are required!";
    return;
  }
  document.getElementById("template-error").textContent = "";
  template.name = name;
  template.icon = icon;
  template.type = document.getElementById("temp-type").value;
  template.coins = parseInt(document.getElementById("temp-coins").value) || 0;
  template.damage = parseInt(document.getElementById("temp-damage").value) || 0;
  template.health = parseInt(document.getElementById("temp-health").value) || 0;
  template.locked = document.getElementById("temp-locked").checked;
  template.tooltip = document.getElementById("temp-tooltip").value.trim();
  try { template.dialog = JSON.parse(document.getElementById("temp-dialog").value); } catch (e) { alert("Invalid dialog JSON"); return; }
  try { template.inventory = JSON.parse(document.getElementById("temp-inventory").value); } catch (e) { alert("Invalid inventory JSON"); return; }
  template.respawnValue = parseInt(document.getElementById("temp-respawn-value").value) || 0;
  template.respawnUnit = document.getElementById("temp-respawn-unit").value;
  template.dropChance = parseInt(document.getElementById("temp-drop-chance").value) || 0;
  template.spawnActions = document.getElementById("temp-spawn-actions").value.trim().split('\n').filter(Boolean);
  template.growthHours = parseInt(document.getElementById("temp-growth-hours").value) || 0;
  template.growthStages = parseInt(document.getElementById("temp-growth-stages").value) || 2;
  template.conditions = document.getElementById("temp-conditions").value.trim();
  renderTemplateList();
  triggerAutoSave();
  alert("Template saved.");
});

// ─── Delete Template ───────────────────────────────────────────────────────────
document.getElementById("delete-template").addEventListener("click", () => {
  if (!selectedTemplateId || !confirm("Delete?")) return;
  templates = templates.filter(t => t.id !== selectedTemplateId);
  selectedTemplateId = null;
  document.getElementById("properties").style.display = "none";
  renderTemplateList();
  triggerAutoSave();
});

// ─── Render Template List ──────────────────────────────────────────────────────
function renderTemplateList() {
  const list = document.getElementById("template-list");
  list.innerHTML = "";
  templates.forEach(t => {
    const item = document.createElement("div");
    item.className = "template-item" + (selectedTemplateId === t.id ? " selected" : "");
    item.textContent = `${t.name} (${t.type})`;
    item.onclick = () => selectTemplate(t.id);
    list.appendChild(item);
  });
}

// ─── Select Template ───────────────────────────────────────────────────────────
function selectTemplate(id) {
  selectedTemplateId = id;
  renderTemplateList();
  const t = templates.find(t => t.id === id);
  if (t) {
    document.getElementById("properties").style.display = "block";
    document.getElementById("temp-type").value = t.type;
    document.getElementById("temp-name").value = t.name;
    document.getElementById("temp-icon").value = t.icon;
    document.getElementById("temp-coins").value = t.coins;
    document.getElementById("temp-damage").value = t.damage;
    document.getElementById("temp-health").value = t.health;
    document.getElementById("temp-locked").checked = t.locked;
    document.getElementById("temp-tooltip").value = t.tooltip;
    document.getElementById("temp-dialog").value = JSON.stringify(t.dialog, null, 2);
    document.getElementById("temp-inventory").value = JSON.stringify(t.inventory, null, 2);
    document.getElementById("temp-respawn-value").value = t.respawnValue;
    document.getElementById("temp-respawn-unit").value = t.respawnUnit;
    document.getElementById("temp-drop-chance").value = t.dropChance;
    document.getElementById("temp-spawn-actions").value = t.spawnActions.join('\n');
    document.getElementById("temp-growth-hours").value = t.growthHours;
    document.getElementById("temp-growth-stages").value = t.growthStages;
    document.getElementById("temp-conditions").value = t.conditions;
    loadImagePreview(t.icon);
  } else {
    document.getElementById("properties").style.display = "none";
  }
}

// ─── Your other functions ──────────────────────────────────────────────────────
/* Add the remaining functions: updateMapEntityList, selectMapEntity, makeDraggable, applyCanvasTransform, getOrCreateSubdir, saveJson, readJson, triggerAutoSave, saveProject, etc. */

</script>
</body>
</html>
