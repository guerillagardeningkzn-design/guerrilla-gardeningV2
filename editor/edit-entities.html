<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guerrilla Gardening - Entity Template Editor</title>
  <link rel="stylesheet" href="css/editor.css">
</head>

<body>

  <div class="container">
    <h1>Entity Template Editor</h1>

    <!-- Repo Root Path -->
    <div class="section">
      <label for="repo-root">Repo Root Path (for local image preview)</label>
      <input type="text" id="repo-root" placeholder="C:/Users/eyeof/Documents/GitHub/guerrilla-gardeningV2/" />
      <button id="save-root">Save Root Path</button>
      <div id="root-status" class="status"></div>
    </div>

    <!-- Main Editor Form -->
    <div class="section">
      <h3>Create / Edit Entity Template</h3>
      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <!-- Category -->
      <label for="entity-category">Category / Folder</label>
      <select id="entity-category">
        <option value="plants/natives">Plants – Native</option>
        <option value="plants/invasives">Plants – Invasive</option>
        <option value="critters" disabled>Critters / Animals</option>
        <option value="fungi" disabled>Fungi / Mushrooms</option>
        <option value="objects" disabled>Objects / Environment</option>
        <option value="markers" disabled>Map Markers / POIs</option>
        <option value="misc" disabled>Miscellaneous</option>
      </select>

      <!-- Basic Info -->
      <label for="temp-id">ID (filename, kebab-case)</label>
      <input type="text" id="temp-id" placeholder="baby-palm" />

      <label for="temp-name">Display Name</label>
      <input type="text" id="temp-name" placeholder="Baby Palm" />

      <label for="temp-icon">Icon Path (relative from assets/entities/)</label>
      <input type="text" id="temp-icon" placeholder="plants/natives/palm/baby-palm.png" />
      <div id="icon-preview"></div>

      <label for="temp-tooltip">Tooltip / Description</label>
      <textarea id="temp-tooltip" placeholder="A small palm seedling, ready to grow..."></textarea>

      <!-- Growth Section -->
<div id="growth-section" class="conditional-section" style="display: none;">
  <fieldset>
    <legend>Growth Parameters
      <button type="button" class="help-btn" data-context="growth">?</button>
    </legend>

    <!-- Base maturation with unit -->
    <label for="growth-base-value">Base Maturation Time</label>
    <div style="display: flex; gap: 12px; align-items: center;">
      <input type="number" id="growth-base-value" min="1" value="45" step="1" style="width: 120px;" />
      <select id="growth-unit">
        <option value="seconds">Seconds</option>
        <option value="minutes">Minutes</option>
        <option value="hours" selected>Hours</option>
        <option value="days">Days</option>
      </select>
    </div>

    <!-- Number of stages -->
    <label for="growth-stages">Number of Growth Stages</label>
    <div style="display: flex; gap: 12px; align-items: center;">
      <input type="number" id="growth-stages" min="1" value="5" step="1" style="width: 80px;" />
      <button type="button" id="growth-add-stage">+ Add Stage</button>
      <button type="button" id="growth-remove-stage">− Remove Last</button>
    </div>

    <!-- Include rarity modifiers checkbox -->
    <label style="margin-top: 16px;">
      <input type="checkbox" id="include-rarity-modifiers" checked />
      Include rarity modifiers (affects maturation speed per rarity)
    </label>

    <!-- Rarity modifiers table (shown if checkbox checked) -->
    <div id="rarity-modifiers-wrapper" style="margin-top: 16px;">
      <label>Rarity Modifiers</label>
      <div id="rarity-modifiers-container"></div>
      <button type="button" id="add-rarity-modifier">+ Add Rarity Modifier</button>
    </div>

    <!-- Dynamic stages list -->
    <div id="growth-stages-container" style="margin-top: 24px;">
      <label>Visual Stages & Labels</label>
      <!-- Stages will be added here dynamically -->
    </div>
  </fieldset>
</div>

      <!-- Harvest Rewards -->
      <div id="harvest-section" class="conditional-section" style="display: none;">
        <fieldset>
          <legend>Harvest Rewards
            <button type="button" class="help-btn" data-context="harvest-rewards">?</button>
          </legend>

          <label for="harvest-coins">Coins on Harvest</label>
          <input type="number" id="harvest-coins" min="0" value="2" step="1" />

          <label for="harvest-health">Health Bonus on Harvest (%)</label>
          <input type="number" id="harvest-health" min="0" value="3" step="1" />
        </fieldset>
      </div>

      <!-- Planting Rules -->
      <div id="planting-section" class="conditional-section" style="display: none;">
        <fieldset>
          <legend>Planting Rules
            <button type="button" class="help-btn" data-context="planting-rules">?</button>
          </legend>

          <label for="planting-energy">Energy Cost to Plant</label>
          <input type="number" id="planting-energy" min="0" value="8" step="1" />

          <label>Soil Amendments Required</label>
          <div style="display: flex; gap: 16px; flex-wrap: wrap;">
            <div>
              <label for="soil-sand">Sand</label>
              <input type="number" id="soil-sand" min="0" value="1" step="1" style="width:80px;" />
            </div>
            <div>
              <label for="soil-clay">Clay</label>
              <input type="number" id="soil-clay" min="0" value="0" step="1" style="width:80px;" />
            </div>
            <div>
              <label for="soil-fertilizer">Fertilizer</label>
              <input type="number" id="soil-fertilizer" min="0" value="0" step="1" style="width:80px;" />
            </div>
          </div>

          <label for="planting-min-maturity">Minimum Maturity to Harvest</label>
          <select id="planting-min-maturity">
            <option value="stage-1">Stage 1</option>
            <option value="stage-2">Stage 2</option>
            <option value="stage-3" selected>Stage 3</option>
            <option value="stage-4">Stage 4</option>
            <option value="mature">Mature (final stage)</option>
          </select>

          <label>
            <input type="checkbox" id="planting-removes" checked />
            Harvest removes the plant (no regrowth possible)
          </label>

          <label>
            <input type="checkbox" id="planting-regrow" />
            Can regrow after harvest
          </label>

          <div id="regrow-delay-wrapper" style="display: none; margin-top: 12px;">
            <label for="planting-regrow-delay">Regrow Delay (hours)</label>
            <input type="number" id="planting-regrow-delay" min="0" value="24" step="1" />
          </div>
        </fieldset>
      </div>
      <!-- Advanced JSON Preview Toggle -->
      <div style="margin-top: 16px;">
        <label>
          <input type="checkbox" id="show-json-preview" />
          Advanced JSON Preview (edit directly)
        </label>
        <div id="json-preview-container" style="display: none; margin-top: 12px;">
          <textarea id="json-preview" rows="10"
            style="width:100%; font-family: monospace; background:#0f0f0f; color:#eee; padding:12px; border:1px solid #444; border-radius:6px;"></textarea>
          <div id="json-sync-warning" style="color:#ff9800; font-size:0.9rem; margin-top:8px; display:none;">
            Warning: Manual JSON edits may overwrite structured fields.
          </div>
        </div>
      </div>

      <div style="margin-top: 24px;">
        <button id="save-template">Save Template</button>
        <button id="load-template-btn">Load Template (JSON)</button>
        <input type="file" id="load-template" accept=".json" style="display:none;" />
      </div>
    </div>

    <!-- Recent Files -->
    <div class="section">
      <h3>Recent Files</h3>
      <div id="recent-files"></div>
    </div>
  </div>

  <!-- Help Modal -->
  <div id="help-overlay" class="help-overlay"></div>
  <div id="help-modal" class="help-modal">
    <div class="help-header">
      <h3 id="help-title">Help</h3>
      <button id="close-help" class="danger">Close</button>
    </div>
    <div id="help-content" class="help-content"></div>
  </div>

  <!-- Scripts -->
  <script src="js/editor.js"></script>
</body>

</html>
